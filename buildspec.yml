version: 0.2

phases:
  install:
    commands:
      - echo "Installing dependencies..."
      - yum install -y docker
      - yum update -y
  pre_build:
    commands:
      - echo "Pre-build phase..."
  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t my-app ./backend
  post_build:
    commands:
      - echo "Logging into Amazon ECR..."
      - aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com
      - echo "Pushing Docker image to ECR..."
      - docker tag my-app:latest $AWS_ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com/archivio-documentale:latest
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.eu-north-1.amazonaws.com/archivio-documentale:latest
artifacts:
  files:
    - '**/*'